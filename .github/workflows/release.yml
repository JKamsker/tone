name: release

on: 
  push:
    branches:
    - 'main'
    tags:
    - 'v*'
env:
  PROJECT_NAME: 'tone'
  PROJECT_PATH: 'tone/tone.csproj'
  PROJECT_OUTPUT_PATH: ${{ github.workspace }}/output/
  DOTNET_VERSION: '8.0.x'
  DOTNET_FRAMEWORK: 'net8.0'
jobs:
  release:
    name: Release
    strategy:
      fail-fast: false
      matrix:
        kind: [
          'linux', 
          'linux-musl-x64',
          'linux-arm',
          'linux-arm64',
          'windows', 
          'macOS',
          'macOS-arm'
        ]
        include:
          - kind: linux
            os: ubuntu-latest
            target: linux-x64
          - kind: linux-musl-x64
            os: ubuntu-latest
            target: linux-musl-x64 # for docker
          - kind: linux-arm
            os: ubuntu-latest
            target: linux-arm    
          - kind: linux-musl-arm
            os: ubuntu-latest
            target: linux-musl-arm
          - kind: linux-arm64
            os: ubuntu-latest
            target: linux-arm64
          - kind: linux-musl-arm64
            os: ubuntu-latest
            target: linux-musl-arm64            
          - kind: windows
            os: windows-latest
            target: win-x64
          - kind: macOS
            os: macos-latest
            target: osx-x64
          - kind: macOS-arm
            os: macos-latest
            target: osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          source-url: "https://nuget.pkg.github.com/sandreas/index.json"
        env:
            NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
      
      - name: Compute versions
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            release_version="${GITHUB_REF_NAME#v}"
            release_tag="${GITHUB_REF_NAME}"
          else
            release_version="0.0.${GITHUB_RUN_NUMBER}"
            release_tag=""
          fi

          package_version="0.0.${GITHUB_RUN_NUMBER}"

          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"

      - name: Build
        id: build
        shell: bash
        run: |
          release_name="${{ env.PROJECT_NAME }}-${{ steps.version.outputs.release_version }}-${{ matrix.target }}"

          
          if [ "${{ matrix.target }}" == "osx-arm64" ]; then
            dotnet publish ${{ env.PROJECT_PATH }} --framework ${{ env.DOTNET_FRAMEWORK }} --runtime "${{ matrix.target }}" -c Release -p:Version=${{ steps.version.outputs.release_version }} -p:EnableCompressionInSingleFile=false -p:PublishSingleFile=true --self-contained true -p:PublishReadyToRun=true -p:PublishTrimmed=true -o "$release_name"
          else 
            dotnet publish ${{ env.PROJECT_PATH }} --framework ${{ env.DOTNET_FRAMEWORK }} --runtime "${{ matrix.target }}" -c Release -p:Version=${{ steps.version.outputs.release_version }} -p:PublishSingleFile=true --self-contained true -p:PublishReadyToRun=true -p:PublishTrimmed=true -o "$release_name"
          fi
          
          if [ "${{ matrix.target }}" == "win-x64" ]; then
            7z a -tzip "${release_name}.zip" "./${release_name}/tone.exe"
          else
            tar czvf "${release_name}.tar.gz" "$release_name/tone"
          fi
          rm -r "$release_name"
      - name: Test
        run: dotnet test --configuration Release /p:Version=${{ steps.version.outputs.release_version }}

      - name: Validate NuGet API key
        if: matrix.target == 'linux-x64'
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            265b2fb6-2cf0-4859-9bc8-b24c00ab4378 > NUGET_API_KEY

      - name: Check NuGet API key
        if: matrix.target == 'linux-x64'
        shell: bash
        run: |
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "NUGET_API_KEY is not set"
            exit 1
          fi

      - name: Pack NuGet tool
        if: matrix.target == 'linux-x64'
        shell: bash
        run: |
          dotnet pack ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --output "${{ github.workspace }}/nuget" \
            -p:Version="${{ steps.version.outputs.package_version }}"

      - name: Push NuGet tool
        if: matrix.target == 'linux-x64'
        shell: bash
        run: |
          dotnet nuget push "${{ github.workspace }}/nuget"/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Publish
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: "${{ env.PROJECT_NAME }}-${{ steps.version.outputs.release_version }}-${{ matrix.target }}*"
          body_path: ${{ env.PROJECT_NAME }}/doc/release/release-notes-${{ steps.version.outputs.release_tag }}.md
          prerelease: endsWith(github.ref, 'prerelease')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  docker:
    needs: release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      -
        name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v3
        with:
          file: tone/Dockerfile.release
          platforms: linux/amd64,linux/arm64,linux/arm/v6,linux/arm/v7
          push: true
          tags: sandreas/tone:${{ github.ref_name }}
          build-args: |
            REF_NAME=${{ github.ref_name }}
